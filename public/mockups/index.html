<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rom Com Photographer PH — Design Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=General+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green: #1C3D2A;
    --cream: #F5F0E8;
    --amber: #C4956A;
    --text: #2A2A2A;
    --muted: #7A7570;
    --card: #FFFFFF;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  }

  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--text); font-family: 'General Sans', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(245,240,232,0.85); backdrop-filter: blur(30px) saturate(1.5);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .topbar-left { display: flex; align-items: center; gap: 1.5rem; }
  .topbar-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text); }
  .topbar-logo img { height: 28px; }
  .topbar-logo span { font-family: 'Instrument Serif', serif; font-size: 1.1rem; font-style: italic; }
  .topbar-divider { width: 1px; height: 24px; background: rgba(0,0,0,0.1); }
  .topbar-title { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .viewport-toggle { display: flex; gap: 0; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
  .viewport-toggle button {
    background: none; border: none; padding: 0.4rem 0.7rem; cursor: pointer;
    color: var(--muted); transition: all 0.2s; display: flex; align-items: center;
  }
  .viewport-toggle button.active { background: var(--green); color: white; }
  .viewport-toggle button:not(:last-child) { border-right: 1px solid rgba(0,0,0,0.1); }
  .viewport-toggle button svg { width: 16px; height: 16px; }

  /* Style tabs */
  .tabs {
    position: fixed; top: 64px; left: 0; right: 0; z-index: 190;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex; justify-content: center; gap: 0.5rem;
    padding: 0.75rem 2rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: none; border: 1px solid rgba(0,0,0,0.08); padding: 0.5rem 1.4rem;
    border-radius: 50px; font-family: 'General Sans', sans-serif; font-size: 13px;
    font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.3s;
    white-space: nowrap; display: flex; align-items: center; gap: 0.5rem;
  }
  .tab:hover { border-color: var(--green); color: var(--green); }
  .tab.active { background: var(--green); border-color: var(--green); color: white; }
  .tab .dot { width: 6px; height: 6px; border-radius: 50%; }
  .tab[data-style="romantic"] .dot { background: #D4A5A5; }
  .tab[data-style="elegant"] .dot { background: #C9A96E; }
  .tab[data-style="grid"] .dot { background: #1C3D2A; }
  .tab[data-style="bento"] .dot { background: #C4956A; }
  .tab[data-style="minimalist"] .dot { background: #C8C0B4; }

  /* Iframe container */
  .preview-area {
    padding-top: 128px;
    display: flex; justify-content: center;
    min-height: 100vh;
    transition: padding 0.4s;
  }

  .iframe-wrap {
    width: 100%;
    max-width: 100%;
    transition: max-width 0.5s cubic-bezier(0.22,1,0.36,1), box-shadow 0.5s;
    position: relative;
  }
  .iframe-wrap.tablet { max-width: 768px; }
  .iframe-wrap.mobile { max-width: 390px; }
  .iframe-wrap.tablet,
  .iframe-wrap.mobile {
    margin-top: 1.5rem;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow), 0 0 0 1px rgba(0,0,0,0.06);
    margin-bottom: 2rem;
  }

  .iframe-wrap iframe {
    width: 100%; height: calc(100vh - 128px); border: none; display: block;
    background: white;
  }
  .iframe-wrap.tablet iframe,
  .iframe-wrap.mobile iframe {
    height: calc(100vh - 160px);
    border-radius: var(--radius);
  }

  /* Style info strip */
  .style-info {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 200;
    background: var(--green); color: white;
    padding: 0.6rem 1.5rem; border-radius: 50px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    box-shadow: 0 4px 20px rgba(28,61,42,0.3);
    display: flex; align-items: center; gap: 0.75rem;
    opacity: 0; transform: translateX(-50%) translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }
  .style-info.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .style-info .style-name { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 14px; }
  .style-info .sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }

  /* Keyboard hint */
  .kbd-hint {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .kbd { display: inline-block; padding: 0.15rem 0.45rem; border: 1px solid rgba(0,0,0,0.15); border-radius: 4px; font-size: 10px; font-family: monospace; background: white; }

  @media (max-width: 768px) {
    .topbar { padding: 0 1rem; }
    .topbar-divider, .topbar-title { display: none; }
    .tabs { padding: 0.6rem 1rem; gap: 0.4rem; }
    .tab { padding: 0.45rem 1rem; font-size: 12px; }
    .viewport-toggle { display: none; }
    .kbd-hint { display: none; }
    .preview-area { padding-top: 116px; }
    .iframe-wrap iframe { height: calc(100vh - 116px); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/" class="topbar-logo">
      <img src="/logo.jpg" alt="Logo">
      <span>Rom Com PH</span>
    </a>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Design Mockups</span>
  </div>
  <div class="topbar-right">
    <div class="viewport-toggle">
      <button class="active" data-view="desktop" title="Desktop">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </button>
      <button data-view="tablet" title="Tablet">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      </button>
      <button data-view="mobile" title="Mobile">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-style="romantic"><span class="dot"></span>Romantic</button>
  <button class="tab" data-style="elegant"><span class="dot"></span>Elegant</button>
  <button class="tab" data-style="grid"><span class="dot"></span>Grid</button>
  <button class="tab" data-style="bento"><span class="dot"></span>Bento</button>
  <button class="tab" data-style="minimalist"><span class="dot"></span>Minimalist</button>
</div>

<div class="preview-area">
  <div class="iframe-wrap" id="iframeWrap">
    <iframe id="preview" src="romantic.html" title="Mockup Preview"></iframe>
  </div>
</div>

<div class="style-info" id="styleInfo">
  <span class="style-name" id="styleName">Romantic</span>
  <span class="sep"></span>
  <span id="styleDesc">Blush pinks, cursive accents, dreamy</span>
</div>

<div class="kbd-hint">
  <span><span class="kbd">&larr;</span> <span class="kbd">&rarr;</span> switch styles</span>
</div>

<script>
  const styles = [
    { id: 'romantic', name: 'Romantic', desc: 'Blush pinks, cursive accents, dreamy', file: 'romantic.html' },
    { id: 'elegant', name: 'Elegant', desc: 'Black & champagne gold, editorial', file: 'elegant.html' },
    { id: 'grid', name: 'Grid', desc: 'Masonry columns, Swiss-design', file: 'grid.html' },
    { id: 'bento', name: 'Bento', desc: 'Apple-inspired cards, soft shadows', file: 'bento.html' },
    { id: 'minimalist', name: 'Minimalist', desc: 'Whitespace-driven, typographic', file: 'minimalist.html' }
  ];

  let currentIdx = 0;
  const iframe = document.getElementById('preview');
  const wrap = document.getElementById('iframeWrap');
  const info = document.getElementById('styleInfo');
  const styleName = document.getElementById('styleName');
  const styleDesc = document.getElementById('styleDesc');
  const tabs = document.querySelectorAll('.tab');
  const viewBtns = document.querySelectorAll('.viewport-toggle button');

  function switchStyle(idx) {
    currentIdx = idx;
    const s = styles[idx];
    iframe.src = s.file;
    styleName.textContent = s.name;
    styleDesc.textContent = s.desc;
    tabs.forEach((t, i) => t.classList.toggle('active', i === idx));

    // Flash the info strip
    info.classList.add('show');
    clearTimeout(window._infoTimer);
    window._infoTimer = setTimeout(() => info.classList.remove('show'), 2500);
  }

  tabs.forEach((tab, i) => {
    tab.addEventListener('click', () => switchStyle(i));
  });

  // Viewport toggle
  viewBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      viewBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      wrap.className = 'iframe-wrap' + (view !== 'desktop' ? ' ' + view : '');
    });
  });

  // Keyboard nav
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') switchStyle((currentIdx + 1) % styles.length);
    if (e.key === 'ArrowLeft') switchStyle((currentIdx - 1 + styles.length) % styles.length);
    if (e.key >= '1' && e.key <= '5') switchStyle(parseInt(e.key) - 1);
  });

  // Show info on load
  setTimeout(() => info.classList.add('show'), 500);
  setTimeout(() => info.classList.remove('show'), 3500);
</script>
</body>
</html>
